# =============================================================================
# Cowatch — Local Docker Compose (planning-level skeleton)
# =============================================================================
# Purpose : Define the full local service graph — mongodb, minio, livekit,
#           server, web, landing, and an optional redis — with networks,
#           named volumes, healthchecks, and env wiring referencing ../.env.
# Status  : Planning (Phase 0 — Architecture). FORWARD-LOOKING SKELETON.
# Owner   : DevOps Engineer
# Last updated: 2026-06-27
#
# -----------------------------------------------------------------------------
# PLANNING NOTE — the apps (server/web/landing) DO NOT EXIST YET.
# The build contexts and Dockerfiles referenced here are forward-looking
# skeletons. This file documents the INTENDED local topology so it can be
# stood up the moment the apps are scaffolded. It will not `up` cleanly until
# the application code + Dockerfiles are implemented.
#
# Canon ........... ../context/architecture.md (§5 Realtime, §8 Auth, §10)
# Deployment doc .. ../docs/DEPLOYMENT.md       (§3 Topology, §4 Local workflow)
# Env contract .... ../.env.example  (copy -> .env / docker/.env.local)
# Usage ........... ./README.md
#
# NAMING NOTE (consistency with docs/DEPLOYMENT.md):
#   DEPLOYMENT.md §2.3 describes a base `compose.yml` + per-target overrides
#   (compose.local.yml / compose.vps.yml / compose.observability.yml). This
#   `docker-compose.yml` is the LOCAL, all-in-one realization of that plan
#   (base graph + local conveniences) — the canonical `docker compose up`
#   entrypoint for developers. The override-file split is the production-grade
#   evolution and is documented in README.md §"Override strategy".
#
# Targets map (see ../docs/DEPLOYMENT.md §6.1):
#   local -> THIS FILE (host-published ports, hot reload, single server, no TLS)
#   vps   -> + compose.vps.yml (Traefik TLS, Redis, restart policies, limits)
#   vercel-> static web/landing on Vercel CDN; data tier external
#   prod  -> same images via orchestrator (Swarm/K8s)
# =============================================================================

name: cowatch

# -----------------------------------------------------------------------------
# Reusable anchors
# -----------------------------------------------------------------------------
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-common-env: &common-env
  TZ: ${TZ:-UTC}
  NODE_ENV: ${NODE_ENV:-development}

# -----------------------------------------------------------------------------
# Networks (DEPLOYMENT §3.3 — two-network boundary)
#   cowatch-edge     : HTTP-facing services (+ future Traefik). Server joins both.
#   cowatch-internal : data tier (mongo/minio/redis). Not published in vps/prod.
# -----------------------------------------------------------------------------
networks:
  cowatch-edge:
    name: cowatch-edge
    driver: bridge
  cowatch-internal:
    name: cowatch-internal
    driver: bridge

# -----------------------------------------------------------------------------
# Named volumes (DEPLOYMENT §9.1 — only mongo/minio hold durable state)
# -----------------------------------------------------------------------------
volumes:
  mongo-data:
    name: cowatch-mongo-data
  mongo-config:
    name: cowatch-mongo-config
  minio-data:
    name: cowatch-minio-data
  redis-data:
    name: cowatch-redis-data

services:
  # ===========================================================================
  # DATA TIER
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # MongoDB — single-node replica set (Prisma transactions REQUIRE a replica
  # set, ADR-003 / DEPLOYMENT §2.3). The rs-init helper runs `rs.initiate`.
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:7
    container_name: cowatch-mongo
    restart: unless-stopped
    command:
      - "--replSet"
      - "${MONGO_REPLICA_SET:-rs0}"
      - "--bind_ip_all"
    environment:
      <<: *common-env
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-cowatch}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-cowatch}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-cowatch}
    ports:
      # LOCAL ONLY — remove/omit in vps/prod (internal network only).
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
      # Forward-looking: replica-set init script (rs.initiate). See README.
      # - ./mongo/rs-init.js:/docker-entrypoint-initdb.d/rs-init.js:ro
    networks:
      - cowatch-internal
    healthcheck:
      # Ready only once the replica set has a PRIMARY (so Prisma can connect).
      test:
        - "CMD-SHELL"
        - >-
          mongosh --quiet --host localhost
          -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD"
          --authenticationDatabase admin
          --eval "rs.status().ok || rs.initiate().ok" || exit 1
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage (ADR-009). Buckets bootstrapped by the
  # `minio-bootstrap` one-shot below. Server uses a SCOPED service account.
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: cowatch-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      <<: *common-env
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cowatch}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cowatch-minio-secret}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
    ports:
      # LOCAL ONLY — console (:9001) reachable via bastion/SSH-tunnel in prod.
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - cowatch-internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 5
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # MinIO bootstrap — one-shot: create the five canonical buckets + apply
  # least-privilege policy + a scoped service account for the server (D4).
  # Forward-looking: ./minio/bootstrap.sh will hold the `mc` commands.
  # ---------------------------------------------------------------------------
  minio-bootstrap:
    image: minio/mc:latest
    container_name: cowatch-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    environment:
      <<: *common-env
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cowatch}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cowatch-minio-secret}
      MINIO_BUCKET_AVATARS: ${MINIO_BUCKET_AVATARS:-avatars}
      MINIO_BUCKET_ROOM_ASSETS: ${MINIO_BUCKET_ROOM_ASSETS:-room-assets}
      MINIO_BUCKET_UPLOADS: ${MINIO_BUCKET_UPLOADS:-uploads}
      MINIO_BUCKET_THUMBNAILS: ${MINIO_BUCKET_THUMBNAILS:-thumbnails}
      MINIO_BUCKET_CACHES: ${MINIO_BUCKET_CACHES:-caches}
    networks:
      - cowatch-internal
    # Forward-looking placeholder; replace with: ["/scripts/bootstrap.sh"]
    # volumes:
    #   - ./minio/bootstrap.sh:/scripts/bootstrap.sh:ro
    entrypoint:
      - "/bin/sh"
      - "-c"
      - >-
        echo '[planning] minio-bootstrap will: set mc alias, create buckets
        (avatars/room-assets/uploads/thumbnails/caches), apply policies,
        and provision a scoped server service account. No-op until implemented.'
    restart: "no"
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Redis — OPTIONAL locally (profile `redis`); REQUIRED for multi-instance
  # server (D3): pub/sub fan-out, resume buffer, rate-limit counters, presence.
  # A single server instance runs without it (in-process pub/sub).
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cowatch-redis
    profiles: ["redis"]
    restart: unless-stopped
    command: >-
      redis-server --appendonly yes
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - cowatch-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5
    logging: *default-logging

  # ===========================================================================
  # MEDIA PLANE
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # LiveKit — SFU for voice/video/screen-share (ADR-005). Media ports are
  # published directly on the host for WebRTC; config comes from env via
  # ./livekit/livekit.yaml (forward-looking).
  # ---------------------------------------------------------------------------
  livekit:
    image: livekit/livekit-server:latest
    container_name: cowatch-livekit
    restart: unless-stopped
    command: ["--config", "/etc/livekit.yaml"]
    environment:
      <<: *common-env
      # Keys must match LIVEKIT_API_KEY/SECRET the server uses to mint tokens.
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-replace-with-livekit-api-secret}"
    ports:
      - "${LIVEKIT_PORT:-7880}:7880"                # signaling WS/HTTP
      - "${LIVEKIT_TCP_PORT:-7881}:7881"            # WebRTC TCP fallback
      # RTP/UDP media range (host-published; WebRTC needs direct UDP).
      - "${LIVEKIT_RTP_UDP_START:-50000}-${LIVEKIT_RTP_UDP_END:-60000}:50000-60000/udp"
    volumes:
      # Forward-looking: server config rendered from env.
      # - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
    networks:
      - cowatch-edge
      - cowatch-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880/"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 5
    logging: *default-logging

  # ===========================================================================
  # APPLICATION TIER
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # server — NestJS REST + WebSocket gateway (ADR-002). Server-authoritative
  # playback clock (ADR-007). Holds WS connections + in-memory sync state.
  # Built from the multi-stage ./server.Dockerfile (skeleton).
  # ---------------------------------------------------------------------------
  server:
    build:
      context: ..
      dockerfile: docker/server.Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-local-dev}
        IMAGE_VERSION: ${IMAGE_VERSION:-0.0.0-dev}
    image: ${IMAGE_REGISTRY:-ghcr.io/cowatch}/server:${IMAGE_VERSION:-dev}
    container_name: cowatch-server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
      livekit:
        condition: service_started
      # redis is optional; uncomment when running --profile redis multi-instance.
      # redis:
      #   condition: service_healthy
    # env_file pulls the documented superset; explicit env below pins the wiring
    # to the in-network service hostnames (override the localhost defaults).
    env_file:
      - ../.env
    environment:
      <<: *common-env
      SERVER_PORT: ${SERVER_PORT:-3000}
      REALTIME_TRANSPORT: ${REALTIME_TRANSPORT:-native-ws}
      DATABASE_URL: ${DATABASE_URL:-mongodb://cowatch:cowatch@mongo:27017/cowatch?replicaSet=rs0&authSource=admin}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://livekit:7880}
      # REDIS_URL only meaningful with the redis profile / multi-instance.
      REDIS_URL: ${REDIS_URL:-}
    ports:
      - "${SERVER_PORT:-3000}:3000"
    networks:
      - cowatch-edge
      - cowatch-internal
    healthcheck:
      # canon §10 — liveness probe (no deps checked).
      test: ["CMD", "node", "dist/health-probe.js"]
      interval: 15s
      timeout: 3s
      start_period: 25s
      retries: 3
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # web — React + Vite SPA (built to static, served by nginx-unprivileged).
  # Built from ./web.Dockerfile (skeleton). In local dev this is typically run
  # via `turbo dev` (Vite HMR) under a compose override; here it builds the
  # production static image for parity testing.
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-local-dev}
        IMAGE_VERSION: ${IMAGE_VERSION:-0.0.0-dev}
        # Vite inlines API/WS endpoints at BUILD time (VITE_* are public).
        VITE_API_BASE_URL: ${API_BASE_URL:-http://localhost:3000/api/v1}
        VITE_WS_BASE_URL: ${WS_BASE_URL:-ws://localhost:3000}
        VITE_LIVEKIT_URL: ${LIVEKIT_URL:-ws://localhost:7880}
    image: ${IMAGE_REGISTRY:-ghcr.io/cowatch}/web:${IMAGE_VERSION:-dev}
    container_name: cowatch-web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_started
    ports:
      - "${WEB_PORT:-5173}:8080"
    networks:
      - cowatch-edge
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # landing — marketing static site (same nginx static shape as web).
  # Built from ./web.Dockerfile parametrized to the landing app (skeleton);
  # a dedicated ./landing.Dockerfile is the production-grade split.
  # ---------------------------------------------------------------------------
  landing:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
      args:
        APP_NAME: landing
        GIT_SHA: ${GIT_SHA:-local-dev}
        IMAGE_VERSION: ${IMAGE_VERSION:-0.0.0-dev}
    image: ${IMAGE_REGISTRY:-ghcr.io/cowatch}/landing:${IMAGE_VERSION:-dev}
    container_name: cowatch-landing
    restart: unless-stopped
    ports:
      - "${LANDING_PORT:-4321}:8080"
    networks:
      - cowatch-edge
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3
    logging: *default-logging

# =============================================================================
# Forward-looking, NOT defined locally (see ../docs/DEPLOYMENT.md):
#   traefik  -> edge TLS/ACME/routing/rate-limit          (compose.vps.yml)
#   backup   -> mongodump + mc mirror cron sidecar         (compose.vps.yml §9)
#   prometheus/grafana/loki/promtail -> observability stack(compose.observability.yml)
#   desktop  -> reproducible electron-builder stage        (desktop.Dockerfile)
# =============================================================================
